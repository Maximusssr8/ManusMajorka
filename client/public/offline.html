<!DOCTYPE html>

<head>

  <style>
    body { background: #0d0f14; color: #f0f4ff; font-family: 'DM Sans', system-ui, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; flex-direction: column; gap: 16px; }
