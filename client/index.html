        "description": "Free tier available — 5 AI credits per day"
      },
    }

    <!-- JSON-LD Structured Data: FAQPage (Homepage) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is Majorka?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Majorka is an AI-powered product intelligence platform for Australian dropshippers. We analyse TikTok Shop AU, AliExpress, Amazon AU, and eBay AU data to surface winning products with full revenue estimates, supplier info, and ad angles."
          }
        },
        {
          "@type": "Question",
          "name": "How much does Majorka cost?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Majorka offers a free tier with 10 searches per day. Pro plan is $79 AUD/month with unlimited searches, real-time data, and full supplier intelligence."
          }
        },
        {
          "@type": "Question",
          "name": "Is Majorka only for Australian sellers?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Majorka is built for Australian dropshippers but supports US, EU, UK, Asia, and Global markets. AU data is the most detailed."
          }
        },
        {
          "@type": "Question",
          "name": "What makes Majorka different from other product research tools?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Majorka is the only product intelligence platform built specifically for the Australian market. We cross-reference TikTok Shop AU, Amazon AU, eBay AU, and AliExpress AU data simultaneously — giving you AU-validated revenue estimates and AU-compliant supplier recommendations that US-focused tools can't provide."
          }
        },
        {
          "@type": "Question",
          "name": "How do I find winning products with Majorka?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sign up for a free account at majorka.io, navigate to the Winning Products section, and browse our daily-updated feed of AU-validated products. Each product shows estimated daily revenue, margin, supplier info, and AI-generated ad angles. Filter by niche, revenue threshold, or trend velocity to find your next winner."
          }
        }
      ]
    }
    </script>

    <!-- Font stylesheet — Syne (headings) + DM Sans (body) + JetBrains Mono (stats) -->
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;600;700;800&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <!-- Preload critical fonts for faster LCP -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" />
  </head>

  <body style="margin:0;background:#080808;color:#e5e5e5;font-family:'DM Sans',system-ui,sans-serif;">
    <a href="#main-content"
       style="position:absolute;top:-100px;left:16px;z-index:9999;padding:8px 16px;background:#d4af37;color:#080808;border-radius:6px;font-size:14px;font-weight:700;text-decoration:none;transition:top 150ms;"
       onfocus="this.style.top='16px'"
       onblur="this.style.top='-100px'">Skip to content</a>
    <div id="root">
      <!-- Static pre-React fallback. Visible immediately; replaced when React mounts.
           If this text stays on screen >10s, JS failed to load — check console. -->
      <div id="mj-boot" style="position:fixed;inset:0;display:grid;place-items:center;background:#080808;color:#e5e5e5;padding:24px;font-family:'DM Sans',system-ui,sans-serif;">
        <div style="text-align:center;max-width:320px;">
          <div style="font-family:'Syne',system-ui,sans-serif;font-size:22px;font-weight:800;color:#d4af37;letter-spacing:-0.01em;margin-bottom:8px;">Majorka</div>
          <div style="font-size:13px;color:#737373;margin-bottom:20px;">Loading…</div>
          <div style="width:32px;height:32px;border:2px solid #1a1a1a;border-top-color:#d4af37;border-radius:50%;margin:0 auto;animation:mjSpin 0.9s linear infinite;"></div>
          <noscript>
            <div style="margin-top:16px;font-size:13px;color:#ef4444;">JavaScript is required to run Majorka. Please enable it in your browser.</div>
          </noscript>
        </div>
      </div>
    </div>
    <style>@keyframes mjSpin{to{transform:rotate(360deg);}}</style>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // DISABLED — was caching stale bundles across deploys, causing post-deploy black screens.
      // Actively UNREGISTER any previously-registered SW and clear its caches on every page load.
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs){
          regs.forEach(function(r){ r.unregister(); });
        }).catch(function(){});
        if (window.caches && caches.keys) {
          caches.keys().then(function(keys){ keys.forEach(function(k){ caches.delete(k); }); }).catch(function(){});
        }
      }
      // Boot watchdog — if React hasn't replaced #mj-boot within 12s, show an actionable message.
      setTimeout(function(){
        var boot = document.getElementById('mj-boot');
        if (boot && document.contains(boot)) {
          boot.innerHTML = '<div style="text-align:center;max-width:360px;"><div style="font-family:\'Syne\',system-ui,sans-serif;font-size:22px;font-weight:800;color:#d4af37;margin-bottom:8px;">Majorka didn\'t load</div><div style="font-size:13px;color:#a1a1aa;margin-bottom:20px;">The app bundle failed to initialise. This is usually a cached old version. Try a hard refresh.</div><button type="button" onclick="(async()=>{try{if(navigator.serviceWorker){const rs=await navigator.serviceWorker.getRegistrations();for(const r of rs)await r.unregister();}if(window.caches){const ks=await caches.keys();for(const k of ks)await caches.delete(k);}}catch(e){}location.reload(true);})()" style="padding:12px 24px;min-height:44px;background:#d4af37;color:#080808;border:none;border-radius:10px;font-weight:700;font-size:15px;cursor:pointer;">Clear cache and reload</button></div>';
        }
      }, 12000);
    </script>
    <script>
    try {
  var _t = localStorage.getItem("majorka-theme") || localStorage.getItem("theme");
  // ONLY apply dark if explicitly saved — never assume dark
  if (_t === "dark") {
    document.documentElement.classList.add("dark");
    document.documentElement.setAttribute("data-theme", "dark");
  } else {
    document.documentElement.classList.remove("dark");
    document.documentElement.setAttribute("data-theme", "light");
  }
} catch(e) {}
  </script>
</body>

</html>
