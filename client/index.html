<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />
    <title>Majorka — Find Products That Sell</title>
    <meta name="description" content="AI-powered ecommerce intelligence platform. Find winning products, build stores, and scale your dropshipping business." />
    <meta name="keywords" content="AI ecommerce tools, product research AI, Shopify landing page generator, ecommerce OS, dropshipping AI, meta ads generator, ecommerce Australia" />
    <meta name="author" content="Majorka" />
    <meta name="robots" content="index, follow" />

    <!-- Performance: font preload + DNS prefetch -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://ievekuazsjbdrltsdksn.supabase.co" />
    <link rel="dns-prefetch" href="https://js.stripe.com" />
    <meta name="theme-color" content="#6366F1" />

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.majorka.io" />
    <meta property="og:title" content="Majorka — AI Ecommerce OS for Australian Dropshippers" />
    <meta property="og:description" content="Find winning products, build Shopify stores in 60s, spy on competitors. Join 500+ AU dropshippers." />
    <meta property="og:image" content="https://www.majorka.io/og-image.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Majorka — AI Product Intelligence for Australian Dropshippers" />
    <meta name="twitter:description" content="Find $10k/month products in minutes. 500+ AU sellers." />
    <meta name="twitter:image" content="https://www.majorka.io/og-image.png" />

    <!-- Canonical -->
    <link rel="canonical" href="https://www.majorka.io/" />

    <!-- Favicon + PWA -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Majorka" />

    <!-- JSON-LD Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Majorka",
      "url": "https://www.majorka.io",
      "logo": "https://www.majorka.io/favicon.svg",
      "description": "AI-powered product intelligence platform for ecommerce sellers and dropshippers worldwide",
      "foundingDate": "2025",
      "sameAs": [
        "https://twitter.com/majorkaio",
        "https://tiktok.com/@majorkaio"
      ]
    }
    </script>

    <!-- JSON-LD Structured Data: SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Majorka",
      "applicationCategory": "BusinessApplication",
      "description": "AI-powered product intelligence platform for Australian dropshippers. Find winning products, source AU suppliers, and build stores with AI.",
      "url": "https://www.majorka.io",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "AUD",
        "description": "Free tier available — 5 AI credits per day"
      },
    }
    </script>

    <!-- JSON-LD Structured Data: FAQPage (Homepage) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is Majorka?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Majorka is an AI-powered product intelligence platform for Australian dropshippers. We analyse TikTok Shop AU, AliExpress, Amazon AU, and eBay AU data to surface winning products with full revenue estimates, supplier info, and ad angles."
          }
        },
        {
          "@type": "Question",
          "name": "How much does Majorka cost?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Majorka offers a free tier with 10 searches per day. Pro plan is $79 AUD/month with unlimited searches, real-time data, and full supplier intelligence."
          }
        },
        {
          "@type": "Question",
          "name": "Is Majorka only for Australian sellers?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Majorka is built for Australian dropshippers but supports US, EU, UK, Asia, and Global markets. AU data is the most detailed."
          }
        },
        {
          "@type": "Question",
          "name": "What makes Majorka different from other product research tools?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Majorka is the only product intelligence platform built specifically for the Australian market. We cross-reference TikTok Shop AU, Amazon AU, eBay AU, and AliExpress AU data simultaneously — giving you AU-validated revenue estimates and AU-compliant supplier recommendations that US-focused tools can't provide."
          }
        },
        {
          "@type": "Question",
          "name": "How do I find winning products with Majorka?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sign up for a free account at majorka.io, navigate to the Winning Products section, and browse our daily-updated feed of AU-validated products. Each product shows estimated daily revenue, margin, supplier info, and AI-generated ad angles. Filter by niche, revenue threshold, or trend velocity to find your next winner."
          }
        }
      ]
    }
    </script>

    <!-- Font stylesheet (preconnects already above) -->
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <!-- Preload critical fonts for faster LCP -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=DM+Sans:wght@400;500;600&display=swap" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js'));
      }
    </script>
    <script>
    try {
  var _t = localStorage.getItem("majorka-theme") || localStorage.getItem("theme");
  // ONLY apply dark if explicitly saved — never assume dark
  if (_t === "dark") {
    document.documentElement.classList.add("dark");
    document.documentElement.setAttribute("data-theme", "dark");
  } else {
    document.documentElement.classList.remove("dark");
    document.documentElement.setAttribute("data-theme", "light");
  }
} catch(e) {}
  </script>
</body>

</html>
