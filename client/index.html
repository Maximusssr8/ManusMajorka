<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Majorka — The AI Operating System for Ecommerce Winners</title>
    <meta name="description" content="Majorka is the AI operating system built for ecommerce operators. Research products, validate ideas, generate Shopify landing pages, plan launches, and scale — all in one place." />
    <meta name="keywords" content="AI ecommerce tools, product research AI, Shopify landing page generator, ecommerce OS, dropshipping AI, meta ads generator, ecommerce Australia" />
    <meta name="author" content="Majorka" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#080a0e" />

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://majorka.io/" />
    <meta property="og:title" content="Majorka — The AI Operating System for Ecommerce Winners" />
    <meta property="og:description" content="50+ AI tools for ecommerce operators. Research products, validate ideas, generate landing pages, launch campaigns, and scale — all powered by frontier AI." />
    <meta property="og:image" content="https://majorka.io/og-image.svg" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Majorka — AI Ecommerce OS" />
    <meta name="twitter:description" content="50+ AI tools built for serious ecommerce operators. Research, validate, build, launch, and scale — faster than any agency." />
    <meta name="twitter:image" content="https://majorka.io/og-image.svg" />

    <!-- Canonical -->
    <link rel="canonical" href="https://majorka.io/" />

    <!-- Favicon + PWA -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Majorka",
      "applicationCategory": "BusinessApplication",
      "description": "AI-powered ecommerce OS for Australian dropshippers",
      "url": "https://www.majorka.io",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "AUD"
      },
      "operatingSystem": "Web",
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.9",
        "reviewCount": "247"
      }
    }
    </script>

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800;900&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js'));
      }
    </script>
  </body>

</html>
