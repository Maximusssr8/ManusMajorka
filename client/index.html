    <!-- JSON-LD Structured Data: Organization -->

    {
      "@context": "https://schema.org",

        "https://tiktok.com/@majorkaio"
      ]
    }
    </script>

    <!-- JSON-LD Structured Data: SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Majorka",
      "applicationCategory": "BusinessApplication",
      "description": "AI-powered product intelligence platform for Australian dropshippers. Find winning products, source AU suppliers, and build stores with AI.",
      "url": "https://www.majorka.io",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "AUD",
        "description": "Free tier available. Builder $99/mo AUD, Scale $199/mo AUD."
      }
    }
    </script>

    <!-- JSON-LD Structured Data: FAQPage (Homepage) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is Majorka?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Majorka is an AI-powered product intelligence platform for Australian dropshippers. We analyse TikTok Shop AU, AliExpress, Amazon AU, and eBay AU data to surface winning products with full revenue estimates, supplier info, and ad angles."
          }
        },
        {
          "@type": "Question",
          "name": "How much does Majorka cost?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Majorka offers a free tier. Builder plan is $99 AUD/month and Scale plan is $199 AUD/month — both with unlimited searches, real-time data, and full supplier intelligence."
          }
        },
        {
          "@type": "Question",
          "name": "Is Majorka only for Australian sellers?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Majorka is built for Australian dropshippers but supports US, EU, UK, Asia, and Global markets. AU data is the most detailed."
          }
        },
        {
          "@type": "Question",
          "name": "What makes Majorka different from other product research tools?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Majorka is the only product intelligence platform built specifically for the Australian market. We cross-reference TikTok Shop AU, Amazon AU, eBay AU, and AliExpress AU data simultaneously — giving you AU-validated revenue estimates and AU-compliant supplier recommendations that US-focused tools can't provide."
          }
        },
        {
          "@type": "Question",
          "name": "How do I find winning products with Majorka?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sign up for a free account at majorka.io, navigate to the Winning Products section, and browse our daily-updated feed of AU-validated products. Each product shows estimated daily revenue, margin, supplier info, and AI-generated ad angles. Filter by niche, revenue threshold, or trend velocity to find your next winner."
          }
        }
      ]
    }
    </script>

    <script>
      if ('serviceWorker' in navigator) {

      }
    </script>
    <script>
    try {
  var _t = localStorage.getItem("majorka-theme") || localStorage.getItem("theme");
  // ONLY apply dark if explicitly saved — never assume dark
  if (_t === "dark") {
    document.documentElement.classList.add("dark");
    document.documentElement.setAttribute("data-theme", "dark");
  } else {
    document.documentElement.classList.remove("dark");
    document.documentElement.setAttribute("data-theme", "light");
  }
} catch(e) {}
  </script>
</body>
