    <!-- JSON-LD Structured Data: FAQPage (Homepage) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is Majorka?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Majorka is an AI product intelligence platform for AU, US and UK dropshippers. We score tens of millions of AliExpress listings down to the few thousand with real order velocity, then generate AI ad briefs and Shopify-ready stores around them."
          }
        },
        {
          "@type": "Question",
          "name": "How much does Majorka cost?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Majorka offers early access with no credit card required. Paid plans are Builder at $99 AUD/month (full product database, 50 AI briefs, 20 ad generations, 1 Shopify store) and Scale at $199 AUD/month (unlimited briefs and ads, 5 stores, priority support, locked launch pricing). Annual billing saves 20%."
          }
        },
        {
          "@type": "Question",
          "name": "Which markets does Majorka cover?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Majorka covers Australia, the United States and the United Kingdom as first-class markets. Every product is scored independently in each market so you can target where momentum is building, not where demand has saturated."
          }
        },
        {
          "@type": "Question",
          "name": "Where does the product data come from?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "We aggregate live order data from AliExpress and TikTok Shop across AU, US and UK. The pipeline refreshes every 6 hours. Every order count and price is observed from the source platform — no estimates, no synthetic figures."
          }
        },
        {
          "@type": "Question",
          "name": "Do I need a Shopify account to start?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. You can research products, generate AI briefs and write ads without a Shopify account. When you are ready to launch, the Store Builder exports a Shopify-importable JSON you can drop into any new or existing store."
          }
        },
        {
          "@type": "Question",
          "name": "Is there a money-back guarantee?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Every paid plan is covered by a 30-day money-back guarantee. If you do not find a winning product worth shipping, email support@majorka.io with 'refund' in the subject line and we issue a refund within 3 business days, no questions asked."
          }
        }
      ]
    }
    </script>

  <body style="margin:0;background:#04060f;color:#e5e5e5;font-family:'DM Sans',system-ui,sans-serif;">
    <a href="#main-content"

       onfocus="this.style.top='16px'"
       onblur="this.style.top='-100px'">Skip to content</a>
    <div id="root">
      <!-- Static pre-React fallback. Visible immediately; replaced when React mounts.
           If this text stays on screen >10s, JS failed to load — check console. -->
      <div id="mj-boot" style="position:fixed;inset:0;display:grid;place-items:center;background:#04060f;color:#e5e5e5;padding:24px;font-family:'DM Sans',system-ui,sans-serif;">
        <div style="text-align:center;max-width:320px;">
          <div style="font-family:'Syne',system-ui,sans-serif;font-size:22px;font-weight:800;color:#4f8ef7;letter-spacing:-0.01em;margin-bottom:8px;">Majorka</div>
          <div style="font-size:13px;color:#737373;margin-bottom:20px;">Loading…</div>
          <div style="width:32px;height:32px;border:2px solid #161b22;border-top-color:#4f8ef7;border-radius:50%;margin:0 auto;animation:mjSpin 0.9s linear infinite;"></div>
          <noscript>
            <div style="margin-top:16px;font-size:13px;color:#ef4444;">JavaScript is required to run Majorka. Please enable it in your browser.</div>
          </noscript>
        </div>
      </div>
    </div>
    <style>@keyframes mjSpin{to{transform:rotate(360deg);}}</style>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // DISABLED — was caching stale bundles across deploys, causing post-deploy black screens.
      // Actively UNREGISTER any previously-registered SW and clear its caches on every page load.
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs){
          regs.forEach(function(r){ r.unregister(); });
        }).catch(function(){});
        if (window.caches && caches.keys) {
          caches.keys().then(function(keys){ keys.forEach(function(k){ caches.delete(k); }); }).catch(function(){});
        }
      }
      // Boot watchdog — if React hasn't replaced #mj-boot within 12s, show an actionable message.
      setTimeout(function(){
        var boot = document.getElementById('mj-boot');
        if (boot && document.contains(boot)) {
          boot.innerHTML = '<div style="text-align:center;max-width:360px;"><div style="font-family:\'Syne\',system-ui,sans-serif;font-size:22px;font-weight:800;color:#4f8ef7;margin-bottom:8px;">Majorka didn\'t load</div><div style="font-size:13px;color:#a1a1aa;margin-bottom:20px;">The app bundle failed to initialise. This is usually a cached old version. Try a hard refresh.</div><button type="button" onclick="(async()=>{try{if(navigator.serviceWorker){const rs=await navigator.serviceWorker.getRegistrations();for(const r of rs)await r.unregister();}if(window.caches){const ks=await caches.keys();for(const k of ks)await caches.delete(k);}}catch(e){}location.reload(true);})()" style="padding:12px 24px;min-height:44px;background:#4f8ef7;color:#ffffff;border:none;border-radius:10px;font-weight:700;font-size:15px;cursor:pointer;">Clear cache and reload</button></div>';
        }
      }, 12000);
    </script>
    <script>
    try {
  var _t = localStorage.getItem("majorka-theme") || localStorage.getItem("theme");
  // ONLY apply dark if explicitly saved — never assume dark
  if (_t === "dark") {
    document.documentElement.classList.add("dark");
    document.documentElement.setAttribute("data-theme", "dark");
  } else {
    document.documentElement.classList.remove("dark");
    document.documentElement.setAttribute("data-theme", "light");
  }
} catch(e) {}
  </script>
