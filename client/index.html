<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Majorka — AI Ecommerce OS</title>
    <meta name="description" content="AI-powered tools for ecommerce business owners. Research products, build landing pages, launch ad campaigns, and scale your business with Majorka." />
    <meta name="theme-color" content="#d4af37" />
    <meta name="color-scheme" content="dark" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Majorka — AI Ecommerce OS" />
    <meta property="og:description" content="AI-powered tools for ecommerce business owners. Research, build, launch, and scale — all in one platform." />
    <meta property="og:url" content="https://majorka.ai" />
    <meta property="og:site_name" content="Majorka" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Majorka — AI Ecommerce OS" />
    <meta name="twitter:description" content="AI-powered tools for ecommerce business owners. Research, build, launch, and scale." />

    <!-- Favicon & Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />

    <!-- DNS Prefetch -->
    <link rel="dns-prefetch" href="https://api.anthropic.com" />
    <link rel="dns-prefetch" href="https://api.tavily.com" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800;900&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
