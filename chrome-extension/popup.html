<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
  <title>Majorka</title>
</head>
<body>
  <div class="popup-container">
    <header class="popup-header">
      <span class="logo">majorka</span>
      <span class="version">v1.0.0</span>
    </header>

    <div class="status-bar" id="statusBar">
      <span class="status-dot" id="statusDot"></span>
      <span class="status-text" id="statusText">Enter your API key</span>
    </div>

    <div class="api-section">
      <label class="input-label" for="apiKeyInput">API Key</label>
      <div class="input-row">
        <input
          type="password"
          id="apiKeyInput"
          class="api-input"
          placeholder="mk_live_..."
          spellcheck="false"
          autocomplete="off"
        />
        <button id="saveBtn" class="save-btn">Save</button>
      </div>
    </div>

    <div class="stats-section" id="statsSection" style="display: none;">
      <div class="stats-grid">
        <div class="stat-card">
          <span class="stat-value" id="totalProducts">--</span>
          <span class="stat-label">Products Tracked</span>
        </div>
        <div class="stat-card">
          <span class="stat-value stat-hot" id="hotToday">--</span>
          <span class="stat-label">Hot Today</span>
        </div>
      </div>
    </div>

    <div class="error-message" id="errorMessage" style="display: none;"></div>

    <footer class="popup-footer">
      <a href="https://www.majorka.io/app" target="_blank" rel="noopener" class="footer-link">
        Open Majorka Dashboard &rarr;
      </a>
      <a href="https://www.majorka.io/app/api-keys" target="_blank" rel="noopener" class="footer-link footer-link-muted">
        Get your API key &rarr;
      </a>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
