name: Scheduled Deploy

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours (00:00, 06:00, 12:00, 18:00 UTC)
  workflow_dispatch:          # manual trigger: GitHub → Actions → Scheduled Deploy → Run workflow

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.email "deploy@majorka.io"
          git config user.name "Majorka Deploy Bot"

      - name: Check if dev has new commits
        id: diff
        run: |
          git fetch origin dev main
          if git diff --quiet origin/main..origin/dev; then
            echo "no_changes=true" >> $GITHUB_OUTPUT
            echo "⏭️  No new commits on dev — skipping deploy"
          else
            echo "no_changes=false" >> $GITHUB_OUTPUT
            echo "✅ New commits found on dev — proceeding with merge + deploy"
          fi

      - name: Merge dev into main
        if: steps.diff.outputs.no_changes == 'false'
        run: |
          git checkout main
          git merge origin/dev --no-ff -m "chore: scheduled deploy $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push origin main

      - name: Trigger Vercel production deploy
        if: steps.diff.outputs.no_changes == 'false'
        run: |
          SHA=$(git rev-parse HEAD)
          echo "Deploying SHA: $SHA"
          RESPONSE=$(curl -s -X POST "https://api.vercel.com/v13/deployments" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"name\": \"manus-majorka\",
              \"gitSource\": {
                \"type\": \"github\",
                \"ref\": \"main\",
                \"sha\": \"$SHA\",
                \"repoId\": \"1175625068\"
              },
              \"target\": \"production\"
            }")
          DEPLOY_ID=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id','ERROR'))")
          STATE=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('readyState','UNKNOWN'))")
          echo "Deploy ID: $DEPLOY_ID"
          echo "Initial state: $STATE"

          # Poll until ready (max 10 minutes)
          for i in $(seq 1 20); do
            sleep 30
            STATUS=$(curl -s "https://api.vercel.com/v13/deployments/$DEPLOY_ID" \
              -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('readyState','UNKNOWN'))")
            echo "[$i/20] Status: $STATUS"
            if [ "$STATUS" = "READY" ]; then
              echo "✅ Deployed successfully → https://www.majorka.io"
              exit 0
            fi
            if [ "$STATUS" = "ERROR" ] || [ "$STATUS" = "CANCELED" ]; then
              echo "❌ Deploy failed with status: $STATUS"
              exit 1
            fi
          done
          echo "⚠️  Timed out waiting for deploy (it may still complete)"
