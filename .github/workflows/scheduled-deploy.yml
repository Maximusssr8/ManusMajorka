name: Scheduled Deploy

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours (00:00, 06:00, 12:00, 18:00 UTC)
  workflow_dispatch:          # manual trigger: GitHub → Actions → Scheduled Deploy → Run workflow

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required for git push origin main

    steps:
      - name: Checkout repo (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.email "deploy@majorka.io"
          git config user.name "Majorka Deploy Bot"

      - name: Check if dev has new commits
        id: diff
        run: |
          git fetch origin dev main
          if git diff --quiet origin/main..origin/dev; then
            echo "no_changes=true" >> $GITHUB_OUTPUT
            echo "⏭️  No new commits on dev — skipping deploy"
          else
            echo "no_changes=false" >> $GITHUB_OUTPUT
            echo "✅ New commits found on dev — proceeding with merge + deploy"
          fi

      - name: Merge dev into main
        if: steps.diff.outputs.no_changes == 'false'
        run: |
          git checkout main
          git merge origin/dev --no-ff -m "chore: scheduled deploy $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push origin main

      - name: Install Node + pnpm
        if: steps.diff.outputs.no_changes == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy to Vercel (production)
        if: steps.diff.outputs.no_changes == 'false'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          echo "📦 Installing Vercel CLI..."
          npm install -g vercel@latest --silent
          
          echo "🚀 Deploying to production..."
          vercel --prod \
            --token "$VERCEL_TOKEN" \
            --yes \
            --cwd . 2>&1
          
          echo "✅ Deploy triggered → https://www.majorka.io"
